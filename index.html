<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Profiler MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #1a1a1a; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .tg-card { background-color: #242424; border: 1px solid #333; }
        .tg-accent { color: #00FF9D; }
        .tg-bg-accent { background-color: #00FF9D; }
        .progress-bar { background-color: #333; border-radius: 9999px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.9s ease-out; }
    </style>
</head>
<body x-data="profiler()" x-init="init()" x-cloak>

    <div class="sticky top-0 z-50 bg-[#1a1a1a]/90 backdrop-blur-md border-b border-[#333] px-6 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold flex items-center gap-3">
            <i class="fa-solid fa-brain tg-accent"></i>
            Telegram Profiler <span class="text-sm font-mono opacity-50">MAX</span>
        </h1>
        <button @click="reset()" class="px-4 py-2 border border-red-500/30 text-red-400 hover:bg-red-500/10 rounded-xl">
            Сбросить
        </button>
    </div>

    <div class="max-w-4xl mx-auto p-6">

        <!-- КРОК 1 -->
        <div x-show="step === 1 && !promptCopied" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold mb-2">Имя / Никнейм</label>
                <input x-model="personName" type="text" class="w-full bg-[#242424] border border-[#333] rounded-2xl px-5 py-4 focus:ring-2 focus:ring-[#00FF9D] focus:outline-none" placeholder="Например: Сергей_крипто">
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2">Комментарии из Telegram</label>
                <textarea x-model="comments" class="w-full h-72 bg-[#242424] border border-[#333] rounded-3xl p-5 focus:ring-2 focus:ring-[#00FF9D] focus:outline-none" placeholder="Вставьте все комментарии..."></textarea>
            </div>

            <button @click="getProfilePrompt()" 
                    class="w-full bg-[#00FF9D] text-black font-black py-5 rounded-3xl text-lg hover:scale-105 transition-all">
                ПОЛУЧИТЬ МАКСИМАЛЬНЫЙ ПРОФИЛЬ
            </button>
        </div>

        <!-- КРОК 1.5 – Вставка відповіді Grok -->
        <div x-show="step === 1 && promptCopied" class="mt-8 space-y-4">
            <div class="p-4 bg-green-900/20 border border-green-500/30 rounded-2xl text-green-400">
                Промпт скопирован! Вставьте его в Grok и вставьте ответ ниже:
            </div>
            <textarea x-model="grokResponse" class="w-full h-48 bg-[#242424] border border-[#333] rounded-3xl p-5 font-mono text-sm focus:ring-2 focus:ring-[#00FF9D] focus:outline-none" placeholder="Вставьте сюда полный JSON от Grok..."></textarea>
            <button @click="parseProfile()" 
                    class="w-full border-2 border-[#00FF9D] text-[#00FF9D] font-bold py-4 rounded-3xl hover:bg-[#00FF9D] hover:text-black transition-all">
                РАЗОБРАТЬ ПРОФИЛЬ
            </button>
        </div>

        <!-- КРОК 2 -->
        <div x-show="step === 2" class="space-y-8">
            <h2 class="text-3xl font-black" x-text="personName || 'Без имени'"></h2>

            <!-- Прогресс точності -->
            <div class="tg-card p-5 rounded-2xl">
                <div class="flex justify-between mb-2">
                    <span>Точность анализа</span>
                    <span class="font-bold" :class="accuracy >= 75 ? 'text-green-400' : accuracy >= 50 ? 'text-yellow-400' : 'text-red-400'" x-text="accuracy + '%'"></span>
                </div>
                <div class="progress-bar h-3">
                    <div class="progress-fill" :class="accuracy >= 75 ? 'bg-green-500' : accuracy >= 50 ? 'bg-yellow-500' : 'bg-red-500'" :style="'width:' + accuracy + '%'"></div>
                </div>
            </div>

            <!-- Головна картка -->
            <div class="tg-card p-8 rounded-3xl border-l-8 border-[#00FF9D]">
                <div class="flex gap-6">
                    <div class="w-24 h-24 rounded-3xl bg-[#00FF9D] flex items-center justify-center text-6xl text-black">
                        <i class="fa-solid" :class="getFolkIcon()"></i>
                    </div>
                    <div>
                        <h1 class="text-4xl font-black" x-text="data.folk_archetype"></h1>
                        <p class="text-[#00FF9D] text-xl" x-text="data.scientific_mapping"></p>
                    </div>
                </div>
            </div>

            <!-- Повідомлення -->
            <div class="grid gap-4">
                <template x-for="(msg, type) in data.messages" :key="type">
                    <div class="tg-card p-6 rounded-3xl">
                        <p class="text-sm mb-4" x-text="msg"></p>
                        <button @click="copy(msg)" class="w-full py-3 bg-[#333] hover:bg-[#00FF9D] hover:text-black rounded-2xl text-sm font-bold transition-all">
                            Скопировать
                        </button>
                    </div>
                </template>
            </div>

            <button @click="resetToStep1()" class="w-full py-4 border border-[#333] rounded-3xl hover:bg-[#333] transition-all">Новый анализ</button>
        </div>
    </div>

    <script>
        function profiler() {
            return {
                step: 1,
                personName: '',
                comments: '',
                grokResponse: '',
                promptCopied: false,
                data: null,
                accuracy: 0,

                init() {
                    console.log('Telegram Profiler MAX initialized');
                },

                getProfilePrompt() {
                    if (!this.comments.trim()) {
                        alert("Вставьте комментарии!");
                        return;
                    }
                    const prompt = `You are an elite psychological profiling system specialized in analyzing Telegram comments to create detailed personality profiles. Analyze the following comments and provide a comprehensive JSON profile.

Comments: ${this.comments}

Return a JSON object with this structure:
{
  "folk_archetype": "archetype name",
  "scientific_mapping": "psychological mapping",
  "messages": {
    "main": "main message",
    "secondary": "secondary message"
  }
}`;
                    navigator.clipboard.writeText(prompt);
                    this.promptCopied = true;
                    this.accuracy = Math.min(95, Math.floor(this.comments.length / 20));
                    alert("Промпт скопирован! Вставьте ответ Grok ниже.");
                },

                parseProfile() {
                    try {
                        const clean = this.grokResponse.replace(/```json|```/g, '').trim();
                        this.data = JSON.parse(clean);
                        this.step = 2;
                    } catch (e) {
                        alert("Ошибка JSON. Убедитесь, что вставили полный ответ от Grok.");
                        console.error(e);
                    }
                },

                getFolkIcon() {
                    const icons = {
                        'Активный долбоёб': 'fa-bolt-lightning',
                        'Пассивный долбоёб': 'fa-heart-pulse',
                        'Жлоб': 'fa-coins',
                        'Плуг': 'fa-trowel',
                        'Профессор': 'fa-book-open-reader',
                        'Бэтмен': 'fa-mask',
                        'Чемпион': 'fa-crown',
                        'Работяга': 'fa-gears'
                    };
                    return icons[this.data?.folk_archetype] || 'fa-user';
                },

                copy(text) {
                    navigator.clipboard.writeText(text);
                    alert("Скопировано!");
                },

                reset() {
                    this.step = 1;
                    this.promptCopied = false;
                    this.grokResponse = '';
                    this.data = null;
                    this.personName = '';
                    this.comments = '';
                    this.accuracy = 0;
                },

                resetToStep1() {
                    this.step = 1;
                    this.promptCopied = false;
                    this.grokResponse = '';
                    this.data = null;
                }
            }
        }
    </script>
</body>
</html>
