<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Profiler & SE Recommender MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #0f1115; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .tg-card { background-color: #1a1d24; border: 1px solid #2d3342; }
        .tg-accent { color: #00FF9D; }
        .progress-bar { background-color: #0f1115; border-radius: 9999px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        textarea, input, select { background-color: #0f1115; border: 1px solid #2d3342; color: white; }
        textarea:focus, input:focus, select:focus { outline: none; border-color: #00FF9D; box-shadow: 0 0 0 2px rgba(0,255,157,0.2); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f1115; }
        ::-webkit-scrollbar-thumb { background: #2d3342; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #00FF9D; }
    </style>
</head>
<body x-data="profilerApp()" x-init="initApp()" x-cloak>

    <div class="sticky top-0 z-50 bg-[#0f1115]/90 backdrop-blur-md border-b border-[#2d3342] px-6 py-4 flex justify-between items-center shadow-md">
        <h1 class="text-2xl font-bold flex items-center gap-3">
            <!-- ИСПРАВЛЕНО: fa-radar не существует в FA6 Free, заменено на fa-satellite-dish -->
            <i class="fa-solid fa-satellite-dish tg-accent"></i>
            OSINT Profiler <span class="text-sm font-mono opacity-80 text-black bg-[#00FF9D] px-2 py-0.5 rounded">FULL-CYCLE EDITION</span>
        </h1>
        <button type="button" @click="resetToStart()" class="px-5 py-2 border border-[#2d3342] text-gray-300 rounded-xl hover:bg-[#2d3342] transition-colors">
            Сброс
        </button>
    </div>

    <div class="max-w-7xl mx-auto p-6 space-y-8">

        <div x-show="step === 1" x-transition.opacity.duration.500ms class="space-y-6">
            
            <div class="grid md:grid-cols-2 gap-6">
                <div class="tg-card p-6 rounded-3xl relative h-full">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-file-lines tg-accent"></i> Сырые данные (Логи)</h2>
                    <div class="mb-4">
                        <label class="block text-sm text-gray-400 mb-2">Имя / Никнейм цели</label>
                        <input x-model="context.name" type="text" class="w-full rounded-xl px-4 py-3" placeholder="Target_01">
                    </div>
                    <div class="relative">
                        <div class="flex justify-between items-end mb-2">
                            <label class="block text-sm text-gray-400">Переписка / Посты / Комментарии</label>
                            <button type="button" @click="cleanLogs()" class="text-xs font-mono bg-[#2d3342] hover:text-[#00FF9D] px-2 py-1 rounded transition-colors">
                                Очистить мусор
                            </button>
                        </div>
                        <textarea x-model="comments" rows="11" class="w-full rounded-2xl p-4 resize-y" placeholder="Вставьте сырой текст для LLM..."></textarea>
                    </div>
                </div>

                <div class="tg-card p-6 rounded-3xl relative">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-user-secret tg-accent"></i> Контекст и Демография</h2>
                    
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Возраст</label>
                            <input x-model.number="context.age" type="number" class="w-full rounded-xl px-3 py-2" placeholder="35">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Должность / Роль</label>
                            <input x-model="context.job" type="text" class="w-full rounded-xl px-3 py-2" placeholder="Главбух / IT-админ">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Локация (Город/Страна)</label>
                            <input x-model="context.location" type="text" class="w-full rounded-xl px-3 py-2" placeholder="Москва">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Семья</label>
                            <select x-model="context.family" class="w-full rounded-xl px-3 py-2 text-sm">
                                <option>Неизвестно</option><option>Холост</option><option>В браке / Дети</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="block text-xs text-gray-400 mb-1">Хобби / Интересы (через запятую)</label>
                        <input x-model="context.hobbies" type="text" class="w-full rounded-xl px-3 py-2" placeholder="Рыбалка, крипта, авто...">
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Цифровая грамотность</label>
                            <select x-model="context.techLevel" class="w-full rounded-xl px-3 py-2 text-sm">
                                <option value="low">Низкая (Бабушка)</option>
                                <option value="medium" selected>Средняя (Офис)</option>
                                <option value="high">Высокая (IT/Sec)</option>
                            </select>
                        </div>
                        <div class="flex items-center mt-6">
                            <label class="flex items-center cursor-pointer gap-2 text-sm">
                                <input x-model="context.hackedBefore" type="checkbox" class="w-5 h-5 accent-[#00FF9D]">
                                <span class="text-red-400 font-bold">Уже взламывали</span>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs text-gray-400 mb-2">Обнаруженные каналы и соцсети</label>
                        <div class="flex flex-wrap gap-2">
                            <template x-for="ch in ['Telegram', 'WhatsApp', 'Email', 'VK', 'LinkedIn']" :key="ch">
                                <label class="text-xs border border-[#2d3342] px-3 py-1.5 rounded-lg cursor-pointer hover:border-[#00FF9D] transition-colors" :class="context.channels.includes(ch) ? 'bg-[#00FF9D]/20 border-[#00FF9D] text-[#00FF9D]' : 'bg-[#0f1115] text-gray-400'">
                                    <input type="checkbox" class="hidden" :value="ch" x-model="context.channels">
                                    <span x-text="ch"></span>
                                </label>
                            </template>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tg-card p-6 rounded-3xl text-center">
                <button type="button" @click="copyPrompt()" class="w-full md:w-2/3 mx-auto bg-[#00FF9D] hover:bg-emerald-400 text-black font-black py-4 rounded-2xl text-lg transition-all flex justify-center items-center gap-2 shadow-[0_0_20px_rgba(0,255,157,0.2)]">
                    <i class="fa-solid fa-robot"></i> 1. СКОПИРОВАТЬ ПРОМПТ ДЛЯ ИИ
                </button>
                <div x-show="errorMsg" class="mt-4 text-red-400 text-sm font-bold"><span x-text="errorMsg"></span></div>
            </div>

            <div x-show="promptCopied" x-transition class="tg-card p-6 rounded-3xl border border-[#00FF9D]/30 space-y-4">
                <div class="text-[#00FF9D] flex items-center justify-center gap-3 mb-2">
                    <i class="fa-solid fa-check-circle text-xl"></i>
                    <p class="font-bold">Промпт готов. Отдайте его нейросети и вставьте JSON-ответ сюда:</p>
                </div>
                <textarea x-model="grokResponse" rows="4" class="w-full bg-[#0f1115] rounded-2xl p-4 font-mono text-sm focus:border-[#00FF9D]" placeholder='{"behavioral_archetype": "...", ...}'></textarea>
                
                <button type="button" @click="parseProfileAndRecommend()" class="w-full py-4 border-2 border-[#00FF9D] text-[#00FF9D] font-bold rounded-2xl hover:bg-[#00FF9D] hover:text-black transition-all flex justify-center items-center gap-2">
                    <i class="fa-solid fa-microchip"></i> 2. АНАЛИЗИРОВАТЬ И ПОДОБРАТЬ АТАКИ
                </button>
            </div>
        </div>

        <div x-show="step === 2" x-transition.opacity.duration.800ms class="space-y-6">
            
            <div id="export-content" class="bg-[#0f1115] p-2 space-y-6">
                <div class="flex justify-between items-end border-b border-[#2d3342] pb-4">
                    <div>
                        <p class="text-xs font-mono text-gray-500 mb-1">TARGET DOSSIER</p>
                        <h2 class="text-4xl font-black uppercase tracking-wider text-white" x-text="context.name || 'АНОНИМ'"></h2>
                        <div class="flex gap-3 mt-2 text-sm text-[#00FF9D] font-mono">
                            <span x-show="context.job"><i class="fa-solid fa-briefcase mr-1"></i> <span x-text="context.job"></span></span>
                            <span x-show="context.age"><i class="fa-solid fa-cake-candles mr-1"></i> <span x-text="context.age + ' лет'"></span></span>
                            <span x-show="context.location"><i class="fa-solid fa-location-dot mr-1"></i> <span x-text="context.location"></span></span>
                        </div>
                    </div>
                    <div class="text-right">
                        <i class="fa-solid fa-fingerprint text-5xl text-[#2d3342]"></i>
                    </div>
                </div>

                <div class="tg-card p-6 rounded-3xl border-l-4 border-[#00FF9D] flex items-center gap-6">
                    <div class="w-20 h-20 bg-[#00FF9D]/10 rounded-2xl flex items-center justify-center text-4xl tg-accent">
                        <i class="fa-solid" :class="getArchetypeIcon()"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-black mb-1 uppercase tracking-wide" x-text="data?.behavioral_archetype"></h1>
                        <p class="text-gray-400 text-sm leading-relaxed" x-text="data?.scientific_mapping"></p>
                    </div>
                </div>

                <div class="grid md:grid-cols-3 gap-6">
                    <div class="tg-card p-6 rounded-3xl flex flex-col items-center col-span-1">
                        <h3 class="font-bold mb-2 text-lg flex items-center gap-2"><i class="fa-solid fa-chart-pie tg-accent"></i> Big 5</h3>
                        <div class="relative w-full max-w-[220px] aspect-square"><canvas id="radarChart"></canvas></div>
                    </div>

                    <div class="tg-card p-6 rounded-3xl border border-red-900/30 flex flex-col justify-center col-span-1">
                        <h3 class="font-bold mb-6 text-lg text-red-400 flex items-center gap-2"><i class="fa-solid fa-skull"></i> Тёмная триада</h3>
                        <div class="space-y-5 w-full">
                            <template x-for="(val, key) in data?.darkTriad" :key="key">
                                <div>
                                    <div class="flex justify-between text-sm mb-2"><span x-text="translateKey(key)" class="font-medium text-gray-300"></span><span class="text-red-400 font-mono" x-text="val + '%'"></span></div>
                                    <div class="progress-bar h-2"><div class="progress-fill bg-red-600" :style="`width: ${animateBars ? val : 0}%`"></div></div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div class="tg-card p-6 rounded-3xl border border-orange-500/30 col-span-1 flex flex-col justify-center">
                        <h3 class="font-bold mb-4 text-orange-400 flex items-center gap-2"><i class="fa-solid fa-bolt"></i> Уязвимости</h3>
                        <ul class="space-y-3">
                            <template x-for="(vuln, idx) in data?.vulnerabilities" :key="idx">
                                <li class="text-sm text-gray-300 flex items-start gap-2"><i class="fa-solid fa-angle-right text-orange-500 mt-1"></i><span x-text="vuln"></span></li>
                            </template>
                        </ul>
                    </div>
                </div>

                <div class="tg-card p-6 rounded-3xl border-2 border-[#00FF9D]/30 relative overflow-hidden">
                    <div class="absolute top-0 right-0 bg-[#00FF9D] text-black text-xs font-bold px-3 py-1 rounded-bl-xl z-10">AI RECOMMENDATIONS</div>
                    <h3 class="font-black mb-6 text-xl flex items-center gap-3">
                        <i class="fa-solid fa-crosshairs tg-accent"></i> Персонализированные векторы атаки
                        <span class="text-xs font-normal text-gray-400 hidden md:inline">С учетом профиля и демографии</span>
                    </h3>
                    
                    <div class="space-y-4">
                        <template x-for="(attack, idx) in recommendedAttacks" :key="idx">
                            <div class="bg-[#0f1115] border border-[#2d3342] p-5 rounded-2xl hover:border-[#00FF9D]/50 transition-all">
                                <div class="flex justify-between items-start mb-3">
                                    <h4 class="font-bold text-[#00FF9D] text-lg" x-text="`№${idx+1} — ${attack.title}`"></h4>
                                    <span class="text-sm font-mono bg-[#2d3342] px-3 py-1 rounded-lg text-white font-bold" x-text="`Score: ${(attack.score * 100).toFixed(1)}%`"></span>
                                </div>
                                <div class="flex flex-wrap gap-2 mb-3">
                                    <span class="text-xs bg-[#1a1d24] text-gray-300 px-2 py-1 rounded" x-text="`Глава ${attack.chapter} • ${attack.section}`"></span>
                                    <span class="text-xs bg-purple-900/30 text-purple-300 border border-purple-500/30 px-2 py-1 rounded" x-text="attack.type"></span>
                                    <span class="text-xs bg-red-900/30 text-red-300 border border-red-500/30 px-2 py-1 rounded" x-text="attack.malicious_action"></span>
                                </div>
                                <div class="bg-[#1a1d24] p-4 rounded-xl text-sm border-l-4 border-[#00FF9D] text-gray-200 font-mono mb-3 leading-relaxed" x-text="attack.text"></div>
                                <div class="text-xs text-blue-300 bg-blue-900/20 p-3 rounded-xl flex items-start gap-2 border border-blue-500/20">
                                    <i class="fa-solid fa-brain mt-0.5"></i>
                                    <span x-text="attack.explanation"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div class="flex gap-4 pb-10">
                <button @click="downloadPDF()" class="w-1/2 py-4 bg-[#00FF9D] text-black font-bold rounded-2xl hover:bg-emerald-400 transition-colors shadow-lg"><i class="fa-solid fa-file-pdf"></i> PDF ОТЧЕТ</button>
                <button @click="resetToStart()" class="w-1/2 py-4 border border-[#2d3342] rounded-2xl hover:bg-[#2d3342] font-bold text-gray-300">НОВАЯ ЦЕЛЬ</button>
            </div>
        </div>
    </div>

    <script>

                        if (exVec[4] > 0.7 && v[4] > 0.7) exp.push("Хорошо ложится на активный социальный профиль (соцсети/мессенджеры).");
                        if (this.context.location && ex.text.toLowerCase().includes('событийн')) exp.push("Локальная/событийная привязка.");
                        if (exp.length === 0) exp.push("Оптимальное математическое совпадение с психотипом.");

                        return { ...ex, score, explanation: exp.join(" ") };
                    });

                    if (!this.context.channels.includes('Email')) {
                        scored = scored.filter(a => !a.malicious_action.toLowerCase().includes('вложение'));
                    }

                    this.recommendedAttacks = scored.sort((a, b) => b.score - a.score).slice(0, 3);
                },

                goToStep2() {
                    this.step = 2;
                    this.$nextTick(() => {
                        this.renderChart();
                        setTimeout(() => this.animateBars = true, 100);
                    });
                },

                renderChart() {
                    if (this.chartInstance) this.chartInstance.destroy();
                    this.chartInstance = new Chart(document.getElementById('radarChart'), {
                        type: 'radar',
                        data: {
                            labels: ['Открытость', 'Добросовестность', 'Экстраверсия', 'Доброжелательность', 'Нейротизм'],
                            datasets: [{
                                data: [this.data.bigFive.Openness, this.data.bigFive.Conscientiousness, this.data.bigFive.Extraversion, this.data.bigFive.Agreeableness, this.data.bigFive.Neuroticism],
                                backgroundColor: 'rgba(0, 255, 157, 0.2)',
                                borderColor: '#00FF9D',
                                pointBackgroundColor: '#00FF9D',
                                borderWidth: 2
                            }]
                        },
                        options: {
                            scales: { r: { angleLines: {color: '#2d3342'}, grid: {color: '#2d3342'}, pointLabels: {color: '#e5e7eb'}, ticks: {display: false, min: 0, max: 100} } },
                            plugins: { legend: {display: false} }
                        }
                    });
                },

                getArchetypeIcon() {
                    const m = {'доминатор':'fa-chess-king','аналитик':'fa-microchip','оппортунист':'fa-mask','нарцисс':'fa-star','скептик':'fa-shield-halved','дипломат':'fa-handshake-angle','идеалист':'fa-lightbulb','авантюрист':'fa-dice'};
                    return m[(this.data?.behavioral_archetype||'').toLowerCase()] || 'fa-user-astronaut';
                },

                translateKey(k) {
                    return {'Narcissism':'Нарциссизм','Machiavellianism':'Макиавеллизм','Psychopathy':'Психопатия'}[k] || k;
                },

                downloadPDF() {
                    html2pdf().set({
                        margin: 10,
                        filename: `Dossier_${this.context.name || 'Target'}.pdf`,
                        html2canvas: {scale: 2, backgroundColor: '#0f1115'},
                        jsPDF: {format: 'a4'}
                    }).from(document.getElementById('export-content')).save();
                },

                resetToStart() {
                    this.step = 1;
                    this.data = null;
                    this.animateBars = false;
                    this.grokResponse = '';
                    this.promptCopied = false;
                    this.errorMsg = '';
                    this.context = { name: '', age: '', job: '', location: '', family: 'Неизвестно', hobbies: '', techLevel: 'medium', hackedBefore: false, channels: ['Email', 'Telegram'] };
                }
            }
        }
    </script>
</body>
